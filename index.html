  <body>
    <div id="root"></div>

    <!-- Import Firebase SDK -->
<script type="module">
  // Import fungsi Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // PASTE kod firebaseConfig kau di sini
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB6Mbh-oVDzcRgXcT7lf2WKNMKmRIOO64g",
  authDomain: "aepro-dashboard.firebaseapp.com",
  projectId: "aepro-dashboard",
  storageBucket: "aepro-dashboard.firebasestorage.app",
  messagingSenderId: "804135949349",
  appId: "1:804135949349:web:99ff39bef00790d5bddbcc",
  measurementId: "G-7PT208VPGP"
};

  // Mulakan Firebase & Firestore
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Contoh fungsi untuk simpan rekod baiki phone
  window.simpanRekod = async function() {
    try {
      const docRef = await addDoc(collection(db, "rekod_pelanggan"), {
        nama: "Ali",
        modelPhone: "iPhone 13",
        jenisKerosakan: "FRP Bypass",
        harga: 150,
        tarikh: new Date()
      });
      alert("Rekod berjaya disimpan dengan ID: " + docRef.id);
    } catch (e) {
      console.error("Ralat menambah rekod: ", e);
    }
  };
</script>
